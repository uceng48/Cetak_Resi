<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nyetak Gambar jeung Resi</title>
    <!-- PDF.js -->
    <script src="pdf.min.js"></script>
    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js';
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #0f172a; height: 100vh; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100%; }
        
        /* Header */
        .header { background: #1e293b; border-bottom: 1px solid #334155; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; color: white; z-index: 50; }
        .header h1 { font-size: 1.5rem; font-weight: 900; font-style: italic; text-decoration: underline; text-decoration-color: #3b82f6; }
        .controls { display: flex; gap: 12px; align-items: center; }
        .paper-select { background: #334155; padding: 6px 12px; border-radius: 8px; display: flex; gap: 8px; align-items: center; font-size: 13px; }
        .paper-select select, .paper-select input { background: #1e293b; border: 1px solid #475569; color: white; font-weight: bold; outline: none; padding: 2px 5px; border-radius: 4px; }
        .print-btn { background: #3b82f6; color: white; border: none; padding: 8px 24px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .print-btn:hover { background: #2563eb; }

        /* Main Layout */
        .main { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 320px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; color: white; }
        
        /* Tab Menu */
        .tab-nav { display: flex; background: #0f172a; padding: 8px 8px 0 8px; gap: 4px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #1e293b; color: #94a3b8; cursor: pointer; border-radius: 8px 8px 0 0; font-weight: bold; font-size: 11px; }
        .tab-btn.active { background: #3b82f6; color: white; }

        .tab-content { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .tab-content.active { display: flex; }

        /* Sidebar Sections (Scrollable) */
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 15px; }
        .sidebar-section { margin-bottom: 20px; }
        
        /* Controls */
        .slider-group { margin-bottom: 16px; }
        .slider-group label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; }
        .numeric-input { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
        .numeric-input input { width: 100%; background: #334155; border: 1px solid #475569; color: white; padding: 6px; border-radius: 4px; }
        .info-box { background: #334155; padding: 10px; border-radius: 8px; font-size: 12px; margin-top: 10px; }
        
        /* Asset Grid */
        .asset-grid-title { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; font-size: 11px; font-weight: bold; color: #3b82f6; border-top: 1px solid #334155; }
        .asset-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .asset-item { background: #334155; border-radius: 6px; overflow: hidden; cursor: pointer; border: 2px solid transparent; position: relative; }
        .asset-item:hover { border-color: #3b82f6; }
        .asset-item img { width: 100%; aspect-ratio: 1; object-fit: contain; background: #000; display: block; }
        .asset-item .name { padding: 4px; font-size: 9px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rotate-btn { position: absolute; top: 5px; right: 5px; background: #3b82f6; color: white; border: none; width: 26px; height: 26px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        /* History */
        .history-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        .history-item { background: #334155; border-radius: 6px; overflow: hidden; cursor: pointer; font-size: 9px; text-align: center; }
        .history-item img { width: 100%; aspect-ratio: 1; object-fit: cover; }

        /* Content Area */
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .toolbar { background: #1e293b; padding: 10px 20px; display: flex; gap: 12px; border-bottom: 1px solid #334155; align-items: center; }
        
        .canvas-container { flex: 1; overflow: auto; padding: 20px; display: none; flex-direction: column; align-items: center; gap: 30px; background: #0f172a; }
        .canvas-container.active { display: flex; }

        /* Paper Styles */
        .paper-page { background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-wrap: wrap; align-content: flex-start; justify-content: center; padding-top: 5mm; position: relative; flex-shrink: 0; }
        .slot { border: 0.1mm dashed #ccc; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .slot img { width: 100%; height: 100%; object-fit: fill; }
        .delete-btn { position: absolute; top: 2px; right: 2px; background: rgba(220,38,38,0.8); color: white; border: none; width: 22px; height: 22px; border-radius: 4px; cursor: pointer; display: none; z-index: 10; }
        .slot:hover .delete-btn { display: block; }
        .page-label { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.3); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }

        /* Utility Buttons */
        .btn-blue { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-red { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }

        @media print {
            body, html { background: white; height: auto; overflow: visible; }
            .no-print { display: none !important; }
            .canvas-container { display: none !important; }
            .canvas-container.active { display: block !important; background: white; padding: 0; }
            .paper-page { box-shadow: none; margin: 0 !important; page-break-after: always; border: none; }
            .slot { border: 0.1mm dashed #aaa; }
        }
    </style>
</head>
<body>

<div id="app">
    <header class="header no-print">
        <h1 id="mainTitle">Ndek Nyetak</h1>
        <div class="controls">
            <div class="paper-select">
                <span>KERTAS:</span>
                <select id="paperType">
                    <option value="A4">A4 (210x297mm)</option>
                    <option value="A3">A3 (297x420mm)</option>
                    <option value="A3+">A3+ (329x483mm)</option>
                    <option value="custom">Karso</option>
                </select>
                <span id="customDim" style="display: none;">
                    <input type="number" id="custW" value="210" style="width:55px"> x <input type="number" id="custH" value="297" style="width:55px"> mm
                </span>
            </div>
            <button class="print-btn" onclick="window.print()">CETAK</button>
        </div>
    </header>

    <div class="main">
        <!-- SIDEBAR -->
        <aside class="sidebar no-print">
            <nav class="tab-nav">
                <button class="tab-btn active" onclick="openTab('resi')">NYETAK RESI</button>
                <button class="tab-btn" onclick="openTab('image')">NYETAK GAMBAR</button>
            </nav>

            <!-- TAB RESI -->
            <div id="tab-resi" class="tab-content active">
                <div class="sidebar-scroll">
                    <div class="slider-group">
                        <label>Lebar Resi (mm)</label>
                        <div class="numeric-input">
                            <input type="range" id="resiWidthRange" min="20" max="210" value="100">
                            <input type="number" id="resiWidthNum" value="100">
                        </div>
                    </div>
                    <div class="slider-group">
                        <label>Tinggi Resi (mm)</label>
                        <div class="numeric-input">
                            <input type="range" id="resiHeightRange" min="20" max="297" value="150">
                            <input type="number" id="resiHeightNum" value="150">
                        </div>
                    </div>
                    <div class="info-box">
                        <div>Kapasitas/Hal: <span id="resiCapacity">0</span></div>
                        <div>Total Item: <span id="resiTotal">0</span></div>
                    </div>
                    <br>
                    <button class="btn-blue" style="width:100%" onclick="document.getElementById('pdfInp').click()">+ UPLOAD PDF RESI</button>
                    <input type="file" id="pdfInp" multiple accept="application/pdf" style="display:none">
                    
                    <div class="asset-grid-title">RIWAYAT PDF</div>
                    <div id="resiHistory" class="history-list"></div>
                </div>
            </div>

            <!-- TAB IMAGE -->
            <div id="tab-image" class="tab-content">
                <div class="sidebar-scroll">
                    <div class="slider-group">
                        <label>Ukuran Cetak (mm)</label>
                        <div class="numeric-input">
                            <input type="number" id="imgW" value="50" title="Lebar">
                            <span>x</span>
                            <input type="number" id="imgH" value="50" title="Tinggi">
                        </div>
                    </div>
                    <div class="slider-group">
                        <label>Jarak / Gap (mm)</label>
                        <div class="numeric-input">
                            <input type="number" id="imgGap" value="0" min="0">
                        </div>
                    </div>
                    
                    <div class="asset-grid-title">
                        TINGGAL MILIH
                        <button class="btn-blue" style="padding:2px 8px; font-size:10px" onclick="loadAssets()">MUAT</button>
                    </div>
                    <div id="assetGrid" class="asset-grid">
                        <div style="grid-column: span 2; font-size:10px; color:#94a3b8; text-align:center; padding:10px">Klik Pikeun Milih Gambar</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- CONTENT -->
        <main class="content">
            <div class="toolbar no-print">
                <button class="btn-red" onclick="clearCanvas()">RESET LAYAR</button>
                <span id="pageCounter" style="color:white; font-size:12px; margin-left:auto">Item: 0 | Halaman: 0</span>
            </div>

            <!-- Canvas Resi -->
            <div id="canvas-resi" class="canvas-container active"></div>

            <!-- Canvas Image -->
            <div id="canvas-image" class="canvas-container"></div>
        </main>
    </div>
</div>

<script>
    // Konfigurasi
    let currentMode = 'resi';
    let resiData = [];
    let imageData = [];
    let assetList = [];
    const PAPER_SIZES = { 'A4': [210, 297], 'A3': [297, 420], 'A3+': [329, 483] };

    const imageFilenames = [
        'AESTETiC.jpg', 'ASTRONOT.jpg','AVATAR.jpg','BE-POSITIVE.jpg','BEACH.jpg','BT-21.jpg',
        'COFFEE.jpg', 'DORAEMON.jpg','FARM.jpg','FLOWER-NATURE.jpg','GAME.jpg','IDEAS=COFFEE.jpg',
        'INDONESIA.jpg', 'ITSOK.jpg','KUCINGLUTCU.jpg','LOVE.jpg','MEOW.jpg','MOOD-PANDA.jpg',
        'MOTOR.jpg', 'NOTHINK.jpg','OCEANS.jpg','ONE-PIECE.jpg','PANTAI.jpg','SAMURAI.jpg',
        'SUCCES.jpg', 'SWEAT-CAT.jpg','TRAVELING.jpg','UNICORN.jpg','VW.jpg', 'H013.jpg',
        'H014.jpg', 'H015.jpg','HO16.jpg','H017.jpg','H021.jpg','H022.jpg','H023.jpg','H018.jpg','H019.jpg','H020.jpg'
    ];

    // --- TAB SYSTEM ---
    function openTab(mode) {
        currentMode = mode;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.canvas-container').forEach(v => v.classList.remove('active'));

        event.target.classList.add('active');
        document.getElementById('tab-' + mode).classList.add('active');
        document.getElementById('canvas-' + mode).classList.add('active');
        document.getElementById('mainTitle').innerText = mode === 'resi' ? 'STUDIO CETAK RESI' : 'STUDIO CETAK IMAGE';
        updateUI();
    }

    // --- IMAGE ROTATION (TRUE PIXEL) ---
    async function rotateImageSource(dataUrl, degrees) {
        return new Promise(resolve => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                if (degrees === 90 || degrees === 270) {
                    canvas.width = img.height; canvas.height = img.width;
                } else {
                    canvas.width = img.width; canvas.height = img.height;
                }
                ctx.translate(canvas.width/2, canvas.height/2);
                ctx.rotate(degrees * Math.PI / 180);
                ctx.drawImage(img, -img.width/2, -img.height/2);
                resolve(canvas.toDataURL('image/jpeg', 0.9));
            };
            img.src = dataUrl;
        });
    }

    // --- ASSET MANAGEMENT (REVISI KECEPATAN LOADING) ---
    function loadAssets() {
        const grid = document.getElementById('assetGrid');
        grid.innerHTML = '<div style="grid-column:span 2; text-align:center; color:white">Memuat...</div>';
        
        // REVISI: Langsung mapping URL gambar asli, tidak perlu diconvert ke Canvas di awal
        assetList = imageFilenames.map(name => {
            return {
                id: Math.random(),
                name: name,
                dataUrl: 'images/' + name // Menggunakan URL langsung, sangat cepat!
            };
        });

        renderAssets();
    }

    function renderAssets() {
        const grid = document.getElementById('assetGrid');
        grid.innerHTML = '';
        assetList.forEach((asset, idx) => {
            const div = document.createElement('div');
            div.className = 'asset-item';
            div.innerHTML = `
                <!-- REVISI: Tambahan loading="lazy" agar memori komputer tidak terbebani -->
                <img src="${asset.dataUrl}" loading="lazy" onclick="addToCanvasImg(${idx})">
                <div class="name">${asset.name}</div>
                <button class="rotate-btn" onclick="rotateAsset(${idx})">↻</button>
            `;
            grid.appendChild(div);
        });
    }

    async function rotateAsset(idx) {
        // Saat diputar, baru dikonversi ke Base64 (Canvas)
        assetList[idx].dataUrl = await rotateImageSource(assetList[idx].dataUrl, 90);
        renderAssets();
    }

    // --- LOGIC CETAK ---
    function getPaperDim() {
        const val = document.getElementById('paperType').value;
        if(val === 'custom') return [parseInt(document.getElementById('custW').value), parseInt(document.getElementById('custH').value)];
        return PAPER_SIZES[val];
    }

    function addToCanvasImg(idx) {
        const asset = assetList[idx];
        imageData.push({
            id: Date.now() + Math.random(),
            src: asset.dataUrl,
            w: parseInt(document.getElementById('imgW').value),
            h: parseInt(document.getElementById('imgH').value),
            gap: parseInt(document.getElementById('imgGap').value)
        });
        updateUI();
    }

    function clearCanvas() {
        if(!confirm("Hapus kabeh...?")) return;
        if(currentMode === 'resi') resiData = [];
        else imageData = [];
        updateUI();
    }

    function deleteItem(id) {
        if(currentMode === 'resi') resiData = resiData.filter(i => i.id !== id);
        else imageData = imageData.filter(i => i.id !== id);
        updateUI();
    }

    function updateUI() {
        if(currentMode === 'resi') renderResi();
        else renderImgMode();
    }

    // RENDER RESI
    function renderResi() {
        const container = document.getElementById('canvas-resi');
        container.innerHTML = '';
        const [pW, pH] = getPaperDim();
        const rW = parseInt(document.getElementById('resiWidthNum').value);
        const rH = parseInt(document.getElementById('resiHeightNum').value);
        
        const cols = Math.max(1, Math.floor(pW / rW));
        const rows = Math.max(1, Math.floor((pH - 10) / rH));
        const perPage = cols * rows;
        const totalPages = Math.ceil(resiData.length / perPage) || 0;

        document.getElementById('resiCapacity').innerText = perPage;
        document.getElementById('resiTotal').innerText = resiData.length;
        document.getElementById('pageCounter').innerText = `Item: ${resiData.length} | Halaman: ${totalPages}`;

        for(let i=0; i < totalPages; i++) {
            const page = document.createElement('div');
            page.className = 'paper-page';
            page.style.width = pW + 'mm';
            page.style.height = pH + 'mm';
            page.innerHTML = `<div class="page-label no-print">Halaman ${i+1}</div>`;
            
            const slice = resiData.slice(i * perPage, (i+1) * perPage);
            slice.forEach(item => {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.style.width = rW + 'mm';
                slot.style.height = rH + 'mm';
                slot.innerHTML = `<img src="${item.src}"><button class="delete-btn" onclick="deleteItem(${item.id})">×</button>`;
                page.appendChild(slot);
            });
            container.appendChild(page);
        }
    }

    // RENDER IMAGE
    function renderImgMode() {
        const container = document.getElementById('canvas-image');
        container.innerHTML = '';
        const [pW, pH] = getPaperDim();
        
        if(imageData.length === 0) {
            document.getElementById('pageCounter').innerText = `Item: 0 | Halaman: 0`;
            return;
        }

        let currentPage = createPageEl(pW, pH, 1);
        container.appendChild(currentPage);

        let curX = 0, curY = 0, rowH = 0, pCount = 1;

        imageData.forEach(item => {
            const gap = item.gap;
            // Cek Ganti Baris
            if (curX + item.w > pW - 10) { // margin 10mm
                curX = 0;
                curY += rowH + gap;
                rowH = 0;
            }
            // Cek Ganti Halaman
            if (curY + item.h > pH - 15) {
                pCount++;
                currentPage = createPageEl(pW, pH, pCount);
                container.appendChild(currentPage);
                curX = 0; curY = 0; rowH = 0;
            }

            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.style.width = item.w + 'mm';
            slot.style.height = item.h + 'mm';
            slot.style.marginRight = gap + 'mm';
            slot.style.marginBottom = gap + 'mm';
            slot.innerHTML = `<img src="${item.src}"><button class="delete-btn" onclick="deleteItem(${item.id})">×</button>`;
            
            currentPage.appendChild(slot);
            curX += item.w + gap;
            if(item.h > rowH) rowH = item.h;
        });

        document.getElementById('pageCounter').innerText = `Item: ${imageData.length} | Halaman: ${pCount}`;
    }

    function createPageEl(w, h, n) {
        const div = document.createElement('div');
        div.className = 'paper-page';
        div.style.width = w + 'mm';
        div.style.height = h + 'mm';
        div.style.padding = '5mm';
        div.style.justifyContent = 'flex-start';
        div.innerHTML = `<div class="page-label no-print">Halaman ${n}</div>`;
        return div;
    }

    // --- PDF UPLOAD ---
    document.getElementById('pdfInp').onchange = async (e) => {
        const files = Array.from(e.target.files);
        for(let f of files) {
            const buf = await f.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: buf}).promise;
            for(let i=1; i<=pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({scale: 2});
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                resiData.push({ id: Date.now() + Math.random(), src: dataUrl });
                
                // Simpan ke riwayat
                addToHistory(f.name + ' P'+i, dataUrl);
            }
        }
        updateUI();
    };

    function addToHistory(name, src) {
        const hist = document.getElementById('resiHistory');
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `<img src="${src}"><div>${name}</div>`;
        div.onclick = () => {
            resiData.push({ id: Date.now()+Math.random(), src: src });
            updateUI();
        };
        hist.prepend(div);
    }

    // --- LISTENERS ---
    document.getElementById('paperType').onchange = (e) => {
        document.getElementById('customDim').style.display = e.target.value === 'custom' ? 'inline' : 'none';
        updateUI();
    };
    document.getElementById('custW').oninput = updateUI;
    document.getElementById('custH').oninput = updateUI;

    // Sinkron Slider & Num Resi
    const rWR = document.getElementById('resiWidthRange'); const rWN = document.getElementById('resiWidthNum');
    const rHR = document.getElementById('resiHeightRange'); const rHN = document.getElementById('resiHeightNum');
    rWR.oninput = () => { rWN.value = rWR.value; updateUI(); };
    rWN.oninput = () => { rWR.value = rWN.value; updateUI(); };
    rHR.oninput = () => { rHN.value = rHR.value; updateUI(); };
    rHN.oninput = () => { rHR.value = rHN.value; updateUI(); };

    // Inisialisasi
    updateUI();
</script>
</body>
</html>
