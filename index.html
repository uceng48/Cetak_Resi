<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio Cetak Resi OFFLINE (Final)</title>
    <!-- PDF.js - akan tercache setelah online pertama -->
    <script src="pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js';</script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #0f172a; height: 100vh; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100%; }
        /* Header */
        .header { background: #1e293b; border-bottom: 1px solid #334155; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .header h1 { font-size: 1.5rem; font-weight: 900; font-style: italic; text-decoration: underline; text-decoration-color: #3b82f6; }
        .controls { display: flex; gap: 12px; align-items: center; }
        .paper-select { background: #334155; padding: 6px 12px; border-radius: 8px; display: flex; gap: 8px; align-items: center; }
        .paper-select select { background: transparent; border: none; color: white; font-weight: bold; outline: none; }
        .print-btn { background: #3b82f6; color: white; border: none; padding: 8px 24px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .print-btn:hover { background: #2563eb; }
        /* Main layout */
        .main { display: flex; flex: 1; overflow: hidden; }
        /* Sidebar */
        .sidebar { width: 280px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; color: white; overflow-y: auto; }
        .sidebar-section { padding: 20px; border-bottom: 1px solid #334155; }
        .slider-group { margin-bottom: 16px; }
        .slider-group label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; }
        .slider-group input[type=range] { width: 100%; }
        .info-box { background: #334155; padding: 10px; border-radius: 8px; font-size: 12px; }
        .info-box div { margin: 4px 0; }
        .history-title { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #0f172a; font-size: 12px; font-weight: bold; color: #3b82f6; }
        .history-item { background: #334155; margin: 8px 12px; padding: 8px; border-radius: 6px; border-left: 3px solid #475569; cursor: pointer; font-size: 11px; }
        .history-item:hover { border-left-color: #3b82f6; }
        /* Konten kanan */
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .toolbar { background: #1e293b; padding: 12px 20px; display: flex; gap: 12px; border-bottom: 1px solid #334155; }
        .upload-btn { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .upload-btn input { display: none; }
        .reset-btn { background: #334155; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        /* Canvas container (scroll) */
        .canvas-container { background: #0f172a; flex: 1; padding: 20px; overflow: auto; display: flex; flex-direction: column; align-items: center; gap: 30px; }
        .paper-page { background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-wrap: wrap; align-content: flex-start; justify-content: center; padding-top: 5mm; flex-shrink: 0; position: relative; }
        .slot { border: 1px dashed #ccc; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .slot img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        .delete-btn { position: absolute; top: 2px; right: 2px; background: rgba(220,38,38,0.8); color: white; border: none; width: 20px; height: 20px; border-radius: 4px; font-size: 14px; cursor: pointer; display: none; }
        .slot:hover .delete-btn { display: block; }
        .page-label { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.3); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; pointer-events: none; }
        /* PRINT - PENTING: margin 0 */
        @media print {
            @page { margin: 0; size: auto; }
            html, body { height: auto; overflow: visible; background: white; margin: 0 !important; padding: 0 !important; }
            .no-print { display: none !important; }
            .canvas-container { background: white; padding: 0; gap: 0; overflow: visible; display: block; }
            .paper-page { 
                box-shadow: none; 
                page-break-after: always; 
                break-after: page; 
                margin: 0 !important; 
                border: none; 
                width: 100%; 
                height: auto; /* akan ditimpa inline style dalam mm, tapi browser akan menghormati */
                padding-top: 5mm;
            }
            .paper-page:last-child { page-break-after: auto; break-after: auto; }
            .slot { border: 0.1mm dashed #aaa; }
            .delete-btn, .page-label { display: none !important; }
        }
    </style>
</head>
<body>
<div id="app">
    <header class="header no-print">
        <h1>STUDIO CETAK RESI</h1>
        <div class="controls">
            <div class="paper-select">
                <span>KERTAS:</span>
                <select id="paperType">
                    <option value="A4" selected>A4 (210x297mm)</option>
                    <option value="A3">A3 (297x420mm)</option>
                    <option value="A3+">A3+ (329x483mm)</option>
                </select>
            </div>
            <button class="print-btn" id="printBtn">CETAK RESI</button>
        </div>
    </header>
    <div class="main">
        <div class="sidebar no-print">
            <div class="sidebar-section">
                <div class="slider-group">
                    <label>Lebar Resi: <span id="widthVal">100</span> mm</label>
                    <input type="range" id="widthSlider" min="30" max="210" value="100">
                </div>
                <div class="slider-group">
                    <label>Tinggi Resi: <span id="heightVal">150</span> mm</label>
                    <input type="range" id="heightSlider" min="30" max="297" value="150">
                </div>
                <div class="info-box" id="infoBox">
                    <div>1 Halaman muat: <span id="perPage">2</span> Resi</div>
                    <div>Total Halaman: <span id="totalPages">0</span></div>
                </div>
            </div>
            <div class="history-title">
                RIWAYAT
                <button id="clearHistory" style="background: none; border: none; color: #ef4444; font-weight: bold; cursor: pointer;">HAPUS</button>
            </div>
            <div id="historyList" class="history-list"></div>
        </div>
        <div class="content">
            <div class="toolbar no-print">
                <label class="upload-btn">
                    + UPLOAD PDF
                    <input type="file" id="fileInput" multiple accept="application/pdf">
                </label>
                <button class="reset-btn" id="resetBtn">RESET LAYAR</button>
            </div>
            <div class="canvas-container" id="canvasContainer"></div>
        </div>
    </div>
</div>

<script>
    (function() {
        const PAPER_SIZES = {
            'A4': { w: 210, h: 297 },
            'A3': { w: 297, h: 420 },
            'A3+': { w: 329, h: 483 }
        };

        let resiFiles = [];
        let resiSize = { w: 100, h: 150 };
        let paperType = 'A4';
        let history = [];

        // Elemen DOM
        const paperSelect = document.getElementById('paperType');
        const widthSlider = document.getElementById('widthSlider');
        const heightSlider = document.getElementById('heightSlider');
        const widthVal = document.getElementById('widthVal');
        const heightVal = document.getElementById('heightVal');
        const infoPerPage = document.getElementById('perPage');
        const infoTotalPages = document.getElementById('totalPages');
        const fileInput = document.getElementById('fileInput');
        const resetBtn = document.getElementById('resetBtn');
        const printBtn = document.getElementById('printBtn');
        const canvasContainer = document.getElementById('canvasContainer');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistory');

        // Load history
        function loadHistory() {
            const saved = localStorage.getItem('resi_history_offline_final');
            if (saved) try { history = JSON.parse(saved); } catch { history = []; }
            renderHistory();
        }
        function saveHistory() {
            localStorage.setItem('resi_history_offline_final', JSON.stringify(history.slice(0, 100)));
        }
        function addToHistory(items) {
            history = [...items, ...history].slice(0, 100);
            saveHistory();
            renderHistory();
        }
        function clearHistory() {
            if (confirm('Hapus semua riwayat?')) {
                history = [];
                localStorage.removeItem('resi_history_offline_final');
                renderHistory();
            }
        }
        function renderHistory() {
            historyList.innerHTML = '';
            history.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<div style="font-weight:bold; text-transform:uppercase;">${item.name}</div>
                                 <div style="color:#94a3b8; font-size:9px;">${item.date}</div>`;
                div.addEventListener('click', () => {
                    resiFiles.push({ ...item, id: Math.random() });
                    renderPages();
                });
                historyList.appendChild(div);
            });
        }

        // Trim canvas
        function trimCanvas(canvas) {
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            const w = canvas.width, h = canvas.height;
            const pixels = ctx.getImageData(0, 0, w, h);
            const data = pixels.data;
            let minX = w, minY = h, maxX = 0, maxY = 0, found = false;
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const i = (y * w + x) * 4;
                    if (data[i+3] > 0 && (data[i] < 253 || data[i+1] < 253 || data[i+2] < 253)) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                        found = true;
                    }
                }
            }
            if (!found) return canvas;
            const pad = 1;
            const trimW = (maxX - minX) + pad * 2;
            const trimH = (maxY - minY) + pad * 2;
            const trimmed = document.createElement('canvas');
            trimmed.width = trimW;
            trimmed.height = trimH;
            trimmed.getContext('2d').drawImage(canvas, minX - pad, minY - pad, trimW, trimH, 0, 0, trimW, trimH);
            return trimmed;
        }

        // Upload PDF
        async function handleFileUpload(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            const newItems = [];
            for (const file of files) {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const viewport = page.getViewport({ scale: 2.5 });
                        const canvas = document.createElement('canvas');
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;
                        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                        const trimmed = trimCanvas(canvas);
                        newItems.push({
                            id: Math.random(),
                            name: `${file.name.replace('.pdf','')} - P${i}`,
                            dataUrl: trimmed.toDataURL('image/jpeg', 0.9),
                            date: new Date().toLocaleString('id-ID')
                        });
                    }
                } catch (err) {
                    console.error('Gagal baca PDF', err);
                }
            }
            resiFiles = [...resiFiles, ...newItems];
            addToHistory(newItems);
            renderPages();
        }

        function deleteResi(id) {
            resiFiles = resiFiles.filter(r => r.id !== id);
            renderPages();
        }

        // Render halaman
        function renderPages() {
            const paper = PAPER_SIZES[paperType];
            const cols = Math.max(1, Math.floor(paper.w / resiSize.w));
            const rows = Math.max(1, Math.floor((paper.h - 10) / resiSize.h)); // sisakan 5mm margin atas
            const itemsPerPage = cols * rows;

            const pages = [];
            for (let i = 0; i < resiFiles.length; i += itemsPerPage) {
                pages.push(resiFiles.slice(i, i + itemsPerPage));
            }

            infoPerPage.textContent = itemsPerPage;
            infoTotalPages.textContent = pages.length;

            canvasContainer.innerHTML = '';

            if (pages.length === 0) {
                canvasContainer.innerHTML = '<div class="no-print" style="color:white; text-align:center; padding:2rem;">Tidak ada resi. Upload PDF untuk memulai.</div>';
                return;
            }

            pages.forEach((pageData, pageIdx) => {
                if (pageData.length === 0) return;
                const pageDiv = document.createElement('div');
                pageDiv.className = 'paper-page';
                pageDiv.style.width = paper.w + 'mm';
                pageDiv.style.height = paper.h + 'mm';
                
                const label = document.createElement('div');
                label.className = 'page-label no-print';
                label.textContent = `Halaman ${pageIdx+1}`;
                pageDiv.appendChild(label);

                pageData.forEach(resi => {
                    const slot = document.createElement('div');
                    slot.className = 'slot';
                    slot.style.width = resiSize.w + 'mm';
                    slot.style.height = resiSize.h + 'mm';
                    const img = document.createElement('img');
                    img.src = resi.dataUrl;
                    img.alt = '';
                    slot.appendChild(img);
                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-btn no-print';
                    delBtn.textContent = '×';
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteResi(resi.id);
                    };
                    slot.appendChild(delBtn);
                    pageDiv.appendChild(slot);
                });

                canvasContainer.appendChild(pageDiv);
            });
        }

        // Event listeners
        paperSelect.addEventListener('change', (e) => {
            paperType = e.target.value;
            renderPages();
        });
        widthSlider.addEventListener('input', (e) => {
            resiSize.w = parseInt(e.target.value);
            widthVal.textContent = resiSize.w;
            renderPages();
        });
        heightSlider.addEventListener('input', (e) => {
            resiSize.h = parseInt(e.target.value);
            heightVal.textContent = resiSize.h;
            renderPages();
        });
        fileInput.addEventListener('change', handleFileUpload);
        resetBtn.addEventListener('click', () => {
            resiFiles = [];
            renderPages();
        });
        printBtn.addEventListener('click', () => {
            window.print();
        });
        clearHistoryBtn.addEventListener('click', clearHistory);

        // Inisialisasi
        loadHistory();
        renderPages();
        widthVal.textContent = resiSize.w;
        heightVal.textContent = resiSize.h;
    })();
</script>
</body>
</html>
