<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio Cetak Resi - Asset & Rotasi</title>
    <!-- PDF.js lokal (pastikan pdf.min.js dan pdf.worker.min.js di folder yang sama) -->
    <script src="pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js';</script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #0f172a; height: 100vh; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100%; }
        /* Header */
        .header { background: #1e293b; border-bottom: 1px solid #334155; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .header h1 { font-size: 1.5rem; font-weight: 900; font-style: italic; text-decoration: underline; text-decoration-color: #3b82f6; }
        .controls { display: flex; gap: 12px; align-items: center; }
        .paper-select { background: #334155; padding: 6px 12px; border-radius: 8px; display: flex; gap: 8px; align-items: center; }
        .paper-select select, .paper-select input { background: transparent; border: none; color: white; font-weight: bold; outline: none; }
        .paper-select input { width: 50px; background: #1e293b; padding: 2px 4px; border-radius: 4px; }
        .print-btn { background: #3b82f6; color: white; border: none; padding: 8px 24px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .print-btn:hover { background: #2563eb; }
        /* Main layout */
        .main { display: flex; flex: 1; overflow: hidden; }
        /* Sidebar */
        .sidebar { width: 320px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; color: white; overflow-y: auto; }
        .sidebar-section { padding: 20px; border-bottom: 1px solid #334155; }
        .slider-group { margin-bottom: 16px; }
        .slider-group label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; }
        .slider-group input[type=range] { width: 100%; }
        .slider-group .numeric-input { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
        .slider-group .numeric-input input { width: 70px; background: #334155; border: 1px solid #475569; color: white; padding: 4px; border-radius: 4px; }
        .info-box { background: #334155; padding: 10px; border-radius: 8px; font-size: 12px; }
        .info-box div { margin: 4px 0; }
        .asset-title, .history-title { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #0f172a; font-size: 12px; font-weight: bold; color: #3b82f6; }
        .asset-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 12px; }
        .asset-item { background: #334155; border-radius: 6px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: 0.2s; position: relative; }
        .asset-item:hover { border-color: #3b82f6; }
        .asset-item img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; transition: transform 0.3s; }
        .asset-item .rotate-btn { position: absolute; bottom: 5px; right: 5px; background: #3b82f6; color: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.8; }
        .asset-item .rotate-btn:hover { opacity: 1; background: #2563eb; }
        .asset-item .name { padding: 4px; font-size: 9px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 12px; }
        .history-item { background: #334155; border-radius: 6px; overflow: hidden; cursor: pointer; border: 2px solid transparent; }
        .history-item:hover { border-color: #3b82f6; }
        .history-item img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .history-item div { padding: 4px; font-size: 9px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        /* Konten kanan */
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .toolbar { background: #1e293b; padding: 12px 20px; display: flex; gap: 12px; border-bottom: 1px solid #334155; flex-wrap: wrap; }
        .upload-btn { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .upload-btn input { display: none; }
        .reset-btn { background: #334155; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        /* Canvas container */
        .canvas-container { background: #0f172a; flex: 1; padding: 20px; overflow: auto; display: flex; flex-direction: column; align-items: center; gap: 30px; }
        .paper-page { background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-wrap: wrap; align-content: flex-start; justify-content: center; padding-top: 5mm; flex-shrink: 0; position: relative; }
        .slot { border: 1px dashed #ccc; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .slot img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        .delete-btn { position: absolute; top: 2px; right: 2px; background: rgba(220,38,38,0.8); color: white; border: none; width: 20px; height: 20px; border-radius: 4px; font-size: 14px; cursor: pointer; display: none; }
        .slot:hover .delete-btn { display: block; }
        .page-label { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.3); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; pointer-events: none; }
        /* Print */
        @media print {
            @page { margin: 0; size: auto; }
            html, body { height: auto; overflow: visible; background: white; margin: 0 !important; padding: 0 !important; }
            .no-print { display: none !important; }
            .canvas-container { background: white; padding: 0; gap: 0; overflow: visible; display: block; }
            .paper-page { box-shadow: none; page-break-after: always; break-after: page; margin: 0 !important; border: none; width: 100%; height: auto; padding-top: 5mm; }
            .paper-page:last-child { page-break-after: auto; break-after: auto; }
            .slot { border: 0.1mm dashed #aaa; }
            .delete-btn, .page-label { display: none !important; }
        }
    </style>
</head>
<body>
<div id="app">
    <header class="header no-print">
        <h1>STUDIO CETAK RESI</h1>
        <div class="controls">
            <div class="paper-select">
                <span>KERTAS:</span>
                <select id="paperType">
                    <option value="A4">A4 (210x297mm)</option>
                    <option value="A3">A3 (297x420mm)</option>
                    <option value="A3+">A3+ (329x483mm)</option>
                    <option value="custom">Custom</option>
                </select>
                <span id="customSizeInputs" style="display: none;">
                    <input type="number" id="customWidth" placeholder="L" min="50" value="200" style="width:60px;"> x
                    <input type="number" id="customHeight" placeholder="T" min="50" value="200" style="width:60px;"> mm
                </span>
            </div>
            <button class="print-btn" id="printBtn">CETAK RESI</button>
        </div>
    </header>
    <div class="main">
        <div class="sidebar no-print">
            <div class="sidebar-section">
                <div class="slider-group">
                    <label>Lebar Resi (mm)</label>
                    <div class="numeric-input">
                        <input type="range" id="widthSlider" min="20" max="210" value="100">
                        <input type="number" id="widthNum" min="20" max="210" value="100">
                    </div>
                </div>
                <div class="slider-group">
                    <label>Tinggi Resi (mm)</label>
                    <div class="numeric-input">
                        <input type="range" id="heightSlider" min="20" max="297" value="150">
                        <input type="number" id="heightNum" min="20" max="297" value="150">
                    </div>
                </div>
                <div class="info-box" id="infoBox">
                    <div>1 Halaman muat: <span id="perPage">2</span> Resi</div>
                    <div>Total Halaman: <span id="totalPages">0</span></div>
                </div>
            </div>
            <div class="asset-title">
                ASSET GAMBAR (folder images/)
                <button id="loadAssetsBtn" style="background: #2563eb; border: none; color: white; padding: 2px 8px; border-radius: 4px; cursor: pointer;">Muat</button>
            </div>
            <div class="asset-grid" id="assetGrid">
                <div style="color: #94a3b8; text-align: center; padding: 20px; grid-column: span 2;">Klik "Muat" untuk memuat gambar dari folder images/</div>
            </div>
            <div class="history-title">
                RIWAYAT
                <button id="clearHistory" style="background: none; border: none; color: #ef4444; font-weight: bold; cursor: pointer;">HAPUS</button>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>
        <div class="content">
            <div class="toolbar no-print">
                <label class="upload-btn">
                    + UPLOAD PDF
                    <input type="file" id="pdfUpload" multiple accept="application/pdf">
                </label>
                <button class="reset-btn" id="resetBtn">RESET LAYAR</button>
            </div>
            <div class="canvas-container" id="canvasContainer"></div>
        </div>
    </div>
</div>

<script>
    (function() {
        // Ukuran kertas default
        const PAPER_SIZES = {
            'A4': { w: 210, h: 297 },
            'A3': { w: 297, h: 420 },
            'A3+': { w: 329, h: 483 },
            'custom': { w: 200, h: 200 }
        };

        let resiFiles = [];                // Semua item yang ditampilkan di canvas
        let resiSize = { w: 100, h: 150 };
        let paperType = 'A4';
        let customPaper = { w: 200, h: 200 };
        let history = [];                  // Riwayat dari PDF
        let assets = [];                    // Asset gambar (dari folder images/)

        // Elemen DOM
        const paperSelect = document.getElementById('paperType');
        const customSizeDiv = document.getElementById('customSizeInputs');
        const customWidth = document.getElementById('customWidth');
        const customHeight = document.getElementById('customHeight');
        const widthSlider = document.getElementById('widthSlider');
        const widthNum = document.getElementById('widthNum');
        const heightSlider = document.getElementById('heightSlider');
        const heightNum = document.getElementById('heightNum');
        const infoPerPage = document.getElementById('perPage');
        const infoTotalPages = document.getElementById('totalPages');
        const pdfUpload = document.getElementById('pdfUpload');
        const resetBtn = document.getElementById('resetBtn');
        const printBtn = document.getElementById('printBtn');
        const canvasContainer = document.getElementById('canvasContainer');
        const historyList = document.getElementById('historyList');
        const assetGrid = document.getElementById('assetGrid');
        const clearHistoryBtn = document.getElementById('clearHistory');
        const loadAssetsBtn = document.getElementById('loadAssetsBtn');

        // === Fungsi helper ===
        function getPaperSize() {
            if (paperType === 'custom') {
                return { w: customPaper.w, h: customPaper.h };
            }
            return PAPER_SIZES[paperType];
        }

        // Update info kapasitas
        function updateInfo() {
            const paper = getPaperSize();
            const cols = Math.max(1, Math.floor(paper.w / resiSize.w));
            const rows = Math.max(1, Math.floor((paper.h - 10) / resiSize.h));
            const itemsPerPage = cols * rows;
            const pages = Math.ceil(resiFiles.length / itemsPerPage);
            infoPerPage.textContent = itemsPerPage;
            infoTotalPages.textContent = pages;
        }

        // === Riwayat (dari PDF) ===
        function loadHistory() {
            const saved = localStorage.getItem('resi_history_offline_asset_rotasi');
            if (saved) try { history = JSON.parse(saved); } catch { history = []; }
            renderHistory();
        }
        function saveHistory() {
            localStorage.setItem('resi_history_offline_asset_rotasi', JSON.stringify(history.slice(0, 100)));
        }
        function addToHistory(items) {
            history = [...items, ...history].slice(0, 100);
            saveHistory();
            renderHistory();
        }
        function clearHistory() {
            if (confirm('Hapus semua riwayat?')) {
                history = [];
                localStorage.removeItem('resi_history_offline_asset_rotasi');
                renderHistory();
            }
        }
        function renderHistory() {
            historyList.innerHTML = '';
            history.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<img src="${item.dataUrl}" style="width:100%; aspect-ratio:1; object-fit:cover;">
                                 <div>${item.name}</div>`;
                div.addEventListener('click', () => {
                    resiFiles.push({ ...item, id: Math.random() });
                    renderPages();
                });
                historyList.appendChild(div);
            });
        }

        // === Asset dari folder images/ ===
        // Daftar nama file yang diinginkan (bisa diganti sesuai isi folder)
        const imageFiles = [
            'AESTETiC.jpg', 'ASTRONOT.jpg','AVATAR.jpg','BE-POSITIVE.jpg','BEACH.jpg','BT-21.jpg',
            'COFFEE.jpg', 'DORAEMON.jpg','FARM.jpg','FLOWER-NATURE.jpg','GAME.jpg','IDEAS=COFFEE.jpg',
            'INDONESIA.jpg', 'ITSOK.jpg','KUCINGLUTCU.jpg','LOVE.jpg','MEOW.jpg','MOOD-PANDA.jpg',

             'MOTOR.jpg', 'NOTHINK.jpg','OCEANS.jpg','ONE-PIECE.jpg','PANTAI.jpg','SAMURAI.jpg',
            'SUCCES.jpg', 'SWEAT-CAT.jpg','TRAVELING.jpg','UNICORN.jpg','VW.jpg',
            
            'H013.jpg',
            'H014.jpg', 'H015.jpg','HO16.jpg','H017.jpg','H018.jpg','H019.jpg','H020.jpg'
            
            
        ];

        function loadAssetsFromFolder() {
            assets = [];
            // Buat array promise untuk memuat gambar
            const promises = imageFiles.map(filename => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        // Buat canvas untuk merotasi jika diperlukan? Tidak, simpan saja gambar asli
                        // Tapi kita perlu dataUrl untuk ditampilkan
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                        resolve({
                            id: Math.random(),
                            name: filename,
                            originalDataUrl: dataUrl, // untuk ditampilkan
                            dataUrl: dataUrl, // untuk digunakan (bisa dirotasi)
                            width: img.width,
                            height: img.height,
                            rotation: 0
                        });
                    };
                    img.onerror = () => {
                        console.warn('Gagal memuat:', filename);
                        resolve(null);
                    };
                    img.src = 'images/' + filename;
                });
            });

            Promise.all(promises).then(results => {
                assets = results.filter(a => a !== null);
                renderAssets();
            });
        }

        // Fungsi untuk merotasi gambar
        function rotateAsset(asset, degrees = 90) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    // Ukuran canvas ditukar jika rotasi 90 atau 270
                    const angle = (asset.rotation + degrees) % 360;
                    let w = img.width, h = img.height;
                    if (angle === 90 || angle === 270) {
                        w = img.height;
                        h = img.width;
                    } else {
                        w = img.width;
                        h = img.height;
                    }
                    canvas.width = w;
                    canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.translate(w/2, h/2);
                    ctx.rotate(angle * Math.PI / 180);
                    ctx.drawImage(img, -img.width/2, -img.height/2);
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                    resolve({
                        ...asset,
                        rotation: angle,
                        dataUrl: dataUrl,
                        width: w,
                        height: h
                    });
                };
                img.src = asset.originalDataUrl;
            });
        }

        function renderAssets() {
            assetGrid.innerHTML = '';
            assets.forEach(asset => {
                const div = document.createElement('div');
                div.className = 'asset-item';
                div.innerHTML = `<img src="${asset.dataUrl}" alt="" style="transform: rotate(${asset.rotation}deg);">
                                 <div class="name">${asset.name}</div>
                                 <button class="rotate-btn no-print">↻</button>`;
                // Klik pada gambar untuk menambah ke canvas
                div.querySelector('img').addEventListener('click', () => {
                    resiFiles.push({ 
                        id: Math.random(), 
                        name: asset.name, 
                        dataUrl: asset.dataUrl,
                        type: 'image'
                    });
                    renderPages();
                });
                // Klik tombol rotasi
                div.querySelector('.rotate-btn').addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const rotatedAsset = await rotateAsset(asset, 90);
                    // Update asset di array
                    const index = assets.findIndex(a => a.id === asset.id);
                    if (index !== -1) assets[index] = rotatedAsset;
                    renderAssets();
                });
                assetGrid.appendChild(div);
            });
        }

        // === Upload PDF ===
        async function handlePdfUpload(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            const newItems = [];
            for (const file of files) {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const viewport = page.getViewport({ scale: 2.5 });
                        const canvas = document.createElement('canvas');
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;
                        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                        const trimmed = trimCanvas(canvas);
                        newItems.push({
                            id: Math.random(),
                            name: `${file.name.replace('.pdf','')} - P${i}`,
                            dataUrl: trimmed.toDataURL('image/jpeg', 0.9),
                            date: new Date().toLocaleString('id-ID')
                        });
                    }
                } catch (err) {
                    console.error('Gagal baca PDF', err);
                }
            }
            resiFiles = [...resiFiles, ...newItems];
            addToHistory(newItems);
            renderPages();
        }

        // Trim canvas (sama)
        function trimCanvas(canvas) {
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            const w = canvas.width, h = canvas.height;
            const pixels = ctx.getImageData(0, 0, w, h);
            const data = pixels.data;
            let minX = w, minY = h, maxX = 0, maxY = 0, found = false;
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const i = (y * w + x) * 4;
                    if (data[i+3] > 0 && (data[i] < 253 || data[i+1] < 253 || data[i+2] < 253)) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                        found = true;
                    }
                }
            }
            if (!found) return canvas;
            const pad = 1;
            const trimW = (maxX - minX) + pad * 2;
            const trimH = (maxY - minY) + pad * 2;
            const trimmed = document.createElement('canvas');
            trimmed.width = trimW;
            trimmed.height = trimH;
            trimmed.getContext('2d').drawImage(canvas, minX - pad, minY - pad, trimW, trimH, 0, 0, trimW, trimH);
            return trimmed;
        }

        function deleteResi(id) {
            resiFiles = resiFiles.filter(r => r.id !== id);
            renderPages();
        }

        // Render halaman
        function renderPages() {
            const paper = getPaperSize();
            const cols = Math.max(1, Math.floor(paper.w / resiSize.w));
            const rows = Math.max(1, Math.floor((paper.h - 10) / resiSize.h));
            const itemsPerPage = cols * rows;

            const pages = [];
            for (let i = 0; i < resiFiles.length; i += itemsPerPage) {
                pages.push(resiFiles.slice(i, i + itemsPerPage));
            }

            updateInfo();

            canvasContainer.innerHTML = '';

            if (pages.length === 0) {
                canvasContainer.innerHTML = '<div class="no-print" style="color:white; text-align:center; padding:2rem;">Tidak ada resi. Upload PDF atau klik asset untuk memulai.</div>';
                return;
            }

            pages.forEach((pageData, pageIdx) => {
                if (pageData.length === 0) return;
                const pageDiv = document.createElement('div');
                pageDiv.className = 'paper-page';
                pageDiv.style.width = paper.w + 'mm';
                pageDiv.style.height = paper.h + 'mm';
                
                const label = document.createElement('div');
                label.className = 'page-label no-print';
                label.textContent = `Halaman ${pageIdx+1}`;
                pageDiv.appendChild(label);

                pageData.forEach(resi => {
                    const slot = document.createElement('div');
                    slot.className = 'slot';
                    slot.style.width = resiSize.w + 'mm';
                    slot.style.height = resiSize.h + 'mm';
                    const img = document.createElement('img');
                    img.src = resi.dataUrl;
                    img.alt = '';
                    slot.appendChild(img);
                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-btn no-print';
                    delBtn.textContent = '×';
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteResi(resi.id);
                    };
                    slot.appendChild(delBtn);
                    pageDiv.appendChild(slot);
                });

                canvasContainer.appendChild(pageDiv);
            });
        }

        // Event listeners
        paperSelect.addEventListener('change', (e) => {
            paperType = e.target.value;
            if (paperType === 'custom') {
                customSizeDiv.style.display = 'inline';
                customPaper.w = parseInt(customWidth.value) || 200;
                customPaper.h = parseInt(customHeight.value) || 200;
            } else {
                customSizeDiv.style.display = 'none';
            }
            renderPages();
        });

        customWidth.addEventListener('input', () => {
            customPaper.w = parseInt(customWidth.value) || 200;
            renderPages();
        });
        customHeight.addEventListener('input', () => {
            customPaper.h = parseInt(customHeight.value) || 200;
            renderPages();
        });

        // Sinkronisasi slider dan input number
        function syncWidth(val) {
            resiSize.w = val;
            widthSlider.value = val;
            widthNum.value = val;
            renderPages();
        }
        widthSlider.addEventListener('input', (e) => syncWidth(parseInt(e.target.value)));
        widthNum.addEventListener('input', (e) => syncWidth(parseInt(e.target.value) || 20));

        function syncHeight(val) {
            resiSize.h = val;
            heightSlider.value = val;
            heightNum.value = val;
            renderPages();
        }
        heightSlider.addEventListener('input', (e) => syncHeight(parseInt(e.target.value)));
        heightNum.addEventListener('input', (e) => syncHeight(parseInt(e.target.value) || 20));

        pdfUpload.addEventListener('change', handlePdfUpload);
        resetBtn.addEventListener('click', () => {
            resiFiles = [];
            renderPages();
        });
        printBtn.addEventListener('click', () => {
            window.print();
        });
        clearHistoryBtn.addEventListener('click', clearHistory);
        loadAssetsBtn.addEventListener('click', loadAssetsFromFolder);

        // Inisialisasi
        loadHistory();
        renderPages();

        // Set initial slider values
        widthSlider.value = resiSize.w;
        widthNum.value = resiSize.w;
        heightSlider.value = resiSize.h;
        heightNum.value = resiSize.h;
    })();
</script>
</body>
</html>
